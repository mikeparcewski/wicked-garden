name: v11 Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Setup Node
        # Needed so the E2E gate/resilience tests (tests/e2e/) can resolve the
        # wicked-loom / wicked-vault peers and RUN rather than skip.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"

      - name: Install pytest
        # Stdlib-only project; only pytest is needed for the test suite.
        run: pip install pytest

      - name: Install wicked peers for E2E (required for the trust spine)
        # The trust-spine tests (prove -> loom -> vault) MUST run in CI — a
        # globally-installed vault now satisfies their peer requirement (the
        # GREEN-BUT-HOLLOW fix). The install must succeed: if it fails, the
        # trust spine cannot be exercised and the build is meaningless.
        run: npm i -g wicked-vault wicked-loom wicked-testing

      - name: Run v11 test suite (incl. tests/e2e/ — real-surface gate + resilience)
        # WICKED_REQUIRE_E2E=1 turns a SKIP of the trust-spine ProveEndToEnd
        # tests into a hard FAILURE — so CI can never again be green without
        # actually exercising prove -> loom -> vault (the GREEN-BUT-HOLLOW
        # regression guard). Peers are installed above, so they must run.
        env:
          WICKED_REQUIRE_E2E: "1"
        run: python -m pytest tests/ -q

      - name: Run wicked-patch generator conformance tests
        # Self-contained suite under scripts/engineering/patch/tests/ — run as a
        # separate invocation because its package is named `tests` and would
        # collide with the repo-root tests/ package in a single collection (#879).
        run: python -m pytest scripts/engineering/patch/tests/test_conformance.py -q

      - name: Smoke phase_manager CLI (v11 archetype-mode)
        run: |
          python scripts/crew/phase_manager.py ci-smoke create \
            --description "ci smoke" --archetype-mode build --json
          python scripts/crew/phase_manager.py ci-smoke status --json
          python scripts/crew/phase_manager.py ci-smoke delete

      - name: Smoke archetype detector
        run: |
          python scripts/crew/archetypes_v11.py detect \
            --prompt "drop the legacy_id column from orders" \
            --signals '{"reversibility_low": true, "state_complexity_high": true}' \
            --steering | python -c "
          import json, sys
          payload = json.load(sys.stdin)
          assert any(m['archetype'] == 'migrate' for m in payload['matches']), \
              f'expected migrate match, got: {payload}'
          print('archetype detector smoke: OK')
          "

      - name: Verdict schema validator smoke
        run: |
          cat > /tmp/verdict.json <<'EOF'
          {
            "verdict": "APPROVE",
            "reviewer": "ci-runner",
            "recorded_at": "2026-05-08T10:00:00Z",
            "score": 0.9,
            "conditions": [],
            "findings": []
          }
          EOF
          python scripts/qe/verdict_schema.py /tmp/verdict.json

      - name: Hard-gate refusal smoke
        run: |
          python scripts/crew/phase_manager.py mig-ci-smoke create \
            --description "ci hard gate" --archetype-mode migrate --json
          # Should refuse without --confirmed-by
          if python scripts/crew/phase_manager.py mig-ci-smoke approve \
            --phase cutover --json; then
            echo "FAIL: cutover should have refused without confirmation"
            exit 1
          fi
          # Should advance with confirmation
          python scripts/crew/phase_manager.py mig-ci-smoke approve \
            --phase cutover --confirmed-by "ci-runner" \
            --confirmation-evidence "ci:smoke" --json
          python scripts/crew/phase_manager.py mig-ci-smoke delete
