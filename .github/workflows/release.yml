# Tag-driven release, aligned with the rest of the wicked ecosystem
# (testing/brain/interactive/crew). A `vX.Y.Z` tag push is the only trigger:
# the shared reusable workflow sets the version from the tag
# (`npm version <X.Y.Z> --no-git-tag-version --allow-same-version`), which runs
# this repo's `version` hook (.github/scripts/sync-plugin-version.mjs) to sync
# plugin.json + marketplace.json, then publishes to npm via OIDC trusted
# publishing (+ provenance). No manual manifest pre-bump needed.
#
# Garden specifics:
# - setup_python + test_cmd run garden's structural gates (validate.py,
#   _validate_registry.py) as the pre-publish check; they are python/stdlib and
#   unix-oriented, so os_matrix is narrowed to ubuntu.
# - Publishing stays on OIDC trusted publishing (use_npm_token defaults false);
#   the wicked-garden package's Trusted Publisher must name repo
#   `mikeparcewski/wicked-garden` + workflow `release.yml`.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

jobs:
  release:
    uses: mikeparcewski/wicked-ci/.github/workflows/node-release.yml@d8c9b0a14fb91c2d13f5da0468eeeff983c27e5a # v1.1.2
    with:
      package_name: wicked-garden
      setup_python: true
      python_version: '3.14'
      os_matrix: '["ubuntu-latest"]'
      test_cmd: 'python scripts/ci/validate.py && python scripts/_validate_registry.py'
      enable_sync_pr: true
    secrets: inherit
